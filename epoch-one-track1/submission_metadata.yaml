reproduce_command: "python rank.py --candidates ./data/candidates.jsonl --out ./submission.csv"

compute:
  platform: "Local Windows CPU Machine"
  cpu_cores: 8
  ram_gb: 16
  python_version: "3.11.4"
  os: "Windows 11"
  uses_gpu_for_inference: false
  has_network_during_ranking: false
  pre_computation_required: true
  pre_computation_time_minutes: 10

ai_tools_used:
  - "Gemini"
  - "Cursor"

ai_usage_summary: |
  Used Gemini for architectural design and implementation.
  No candidate data was sent to any external LLM APIs during the ranking process.

methodology_summary: |
  A 4-layer hybrid scoring pipeline combining semantic JD-candidate similarity (30%),
  structured skills match (25%), career progression/experience validation (25%), and
  Redrob behavioral signals (20%). It incorporates natural logical validation checks
  (skills-duration, role duration-total experience, role dates, salary bounds) to automatically
  identify and exclude synthetic honeypots without hardcoding. Average ranking inference
  takes under 10 seconds for 100,000 candidates on CPU.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
